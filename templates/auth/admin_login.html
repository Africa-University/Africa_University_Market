{% extends "base.html" %}

{% block title %}Admin Login - Africa University Market{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2 class="form-title">Admin Login</h2>
        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Admin Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your admin email" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your admin password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login as Admin</button>
        </form>
        <div class="form-footer">
            <p>Not an admin? <a href="{{ url_for('login') }}">Use regular login</a></p>
        </div>
    </div>
</div>
{% endblock %}
