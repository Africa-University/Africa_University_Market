{% extends "base.html" %}

{% block title %}Admin Login - Africa University Market{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2 class="form-title">Admin Login</h2>
        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Admin Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your admin email" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your admin password" required>
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)" aria-label="Show password">Show</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login as Admin</button>
        </form>
        <div class="form-footer">
            <p>Not an admin? <a href="{{ url_for('login') }}">Use regular login</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePasswordVisibility(inputId, button) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        button.textContent = isHidden ? 'Hide' : 'Show';
        button.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }
</script>
{% endblock %}
