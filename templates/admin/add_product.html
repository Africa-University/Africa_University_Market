{% extends "base.html" %}

{% block title %}Add Product - Admin - Africa University Market{% endblock %}

{% block content %}
<div class="container" style="margin-top: 2rem;">
    <div class="form-container" style="max-width: 600px;">
        <h2 class="form-title">Add Agricultural Product</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label class="form-label" for="name">Product Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control"
                    placeholder="e.g. Fresh Maize"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea
                    id="description"
                    name="description"
                    class="form-control"
                    rows="4"
                    placeholder="Describe the product..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="price">Price (R)</label>
                <input
                    type="number"
                    id="price"
                    name="price"
                    class="form-control"
                    step="0.01"
                    min="0"
                    placeholder="0.00"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="category_id">Category</label>
                <select
                    id="category_id"
                    name="category_id"
                    class="form-control"
                    required>
                    <option value="">-- Select Category --</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="image">Product Image</label>
                <input
                    type="file"
                    id="image"
                    name="image"
                    class="form-control"
                    accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">
                Add Product
            </button>
        </form>

        <div class="form-footer">
            <a href="{{ url_for('admin') }}">← Back to Admin Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
